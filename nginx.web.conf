server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"reit-assistant-web"}';
    }

    location /_expo/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Expo Router client-side routes (/sms-updates, /join-sms, /login, …)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
